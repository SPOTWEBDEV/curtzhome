<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login — Curtz Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/admin.css"/>
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#040B14,#0B1629);">
<div id="toast"></div>

<div style="width:100%;max-width:420px;padding:1.5rem;">
  <div style="text-align:center;margin-bottom:2.5rem;">
    <a href="../index.html" class="logo-text" style="color:var(--gold);font-size:1.8rem;text-decoration:none;">Curtz <span style="color:var(--cream);font-weight:300;">Home</span></a>
    <p style="color:var(--text-muted);font-size:0.8rem;margin-top:0.5rem;letter-spacing:0.1em;text-transform:uppercase;">Admin Portal</p>
  </div>

  <div style="background:#060F1E;border:1px solid rgba(201,168,76,0.2);padding:2.5rem;">
    <div style="width:50px;height:50px;border:1px solid rgba(201,168,76,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 2rem;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
    </div>
    <h2 style="text-align:center;font-size:1.5rem;font-weight:300;color:var(--cream);margin-bottom:0.4rem;">Admin Sign In</h2>
    <p style="text-align:center;color:var(--text-muted);font-size:0.8rem;margin-bottom:2rem;">Authorised personnel only</p>

    <form id="adminLoginForm" onsubmit="doAdminLogin(event)">
      <div style="margin-bottom:1.2rem;">
        <label class="form-label">Email Address</label>
        <input type="email" id="adminEmail" class="form-input" placeholder="admin@curtzhome.com" required/>
      </div>
      <div style="margin-bottom:2rem;">
        <label class="form-label">Password</label>
        <input type="password" id="adminPassword" class="form-input" placeholder="••••••••" required/>
      </div>
      <button type="submit" id="loginBtn" class="btn-gold" style="width:100%;text-align:center;padding:1rem;">Sign In to Admin</button>
    </form>
    <p style="text-align:center;margin-top:1.5rem;"><a href="../index.html" style="color:var(--text-muted);font-size:0.8rem;text-decoration:none;">← Back to site</a></p>
  </div>
</div>

<script src="../js/main.js"></script>
<script>
const API = '../api/';
async function doAdminLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const orig = btn.innerHTML;
  setLoading(btn, true, orig);
  const res = await fetch(API + 'auth/login.php', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ email: document.getElementById('adminEmail').value, password: document.getElementById('adminPassword').value })
  });
  const json = await res.json();
  setLoading(btn, false, orig);
  if (res.ok && json.data?.token) {
    if (json.data.user.role !== 'admin') { showToast('Access denied. Admin accounts only.','error'); return; }
    localStorage.setItem('admin_token', json.data.token);
    localStorage.setItem('admin_user', JSON.stringify(json.data.user));
    showToast('Welcome back!','success');
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  } else {
    showToast(json.message || 'Invalid credentials.','error');
  }
}
// Redirect if already logged in as admin
if (localStorage.getItem('admin_token')) {
  const u = JSON.parse(localStorage.getItem('admin_user')||'{}');
  if (u.role === 'admin') window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
